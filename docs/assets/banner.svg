  <line x1="1220" y1="100" x2="1220" y2="540" stroke="#f97316" stroke-opacity="0.04" stroke-width="1"/>
  <!-- Camera body -->
  <rect x="88" y="132" width="72" height="56" rx="6" fill="none" stroke="#f97316" stroke-width="2.5" filter="url(#glow)"/>
  <!-- Camera lens arm -->
  <polygon points="160,148 182,154 160,160" fill="#f97316" filter="url(#glow)"/>
  <!-- Lens -->
  <circle cx="124" cy="160" r="14" fill="none" stroke="#f97316" stroke-width="2" filter="url(#glow)"/>
  <circle cx="124" cy="160" r="5" fill="#f97316" filter="url(#glow)"/>
