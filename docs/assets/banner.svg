<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060408"/>
      <stop offset="100%" stop-color="#0e080c"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="acc2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <pattern id="dot" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#120810"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#dot)"/>
  <rect x="0" y="0" width="4" height="320" fill="url(#acc)"/>
  <!-- camera feed + chat UI mockup (right) -->
  <g opacity="0.24" transform="translate(836,46)">
    <!-- camera view -->
    <rect x="0" y="0" width="200" height="150" rx="10" fill="#1a0c14" stroke="#f97316" stroke-width="1.5"/>
    <text x="100" y="70" font-family="monospace" font-size="11" fill="#6b7280" text-anchor="middle">Camera Feed</text>
    <text x="100" y="86" font-family="monospace" font-size="10" fill="#4b5563" text-anchor="middle">3s JPEG stream</text>
    <!-- SPEAKING badge -->
    <rect x="10" y="10" width="80" height="20" rx="10" fill="#f97316" opacity="0.9"/>
    <circle cx="22" cy="20" r="4" fill="#fff" opacity="0.9"/>
    <text x="40" y="24" font-family="monospace" font-size="10" fill="#fff">SPEAKING</text>
    <!-- audio waveform -->
    <rect x="22" y="115" width="3" height="18" rx="1" fill="#f97316"/>
    <rect x="30" y="108" width="3" height="32" rx="1" fill="#fbbf24"/>
    <rect x="38" y="120" width="3" height="10" rx="1" fill="#f97316"/>
    <rect x="46" y="105" width="3" height="38" rx="1" fill="#fbbf24"/>
    <rect x="54" y="115" width="3" height="18" rx="1" fill="#f97316"/>
    <rect x="62" y="112" width="3" height="25" rx="1" fill="#fbbf24"/>
    <!-- chat panel -->
    <rect x="208" y="0" width="178" height="228" rx="10" fill="#140c1c" stroke="#7c3aed" stroke-width="1.5"/>
    <rect x="216" y="10" width="160" height="34" rx="6" fill="#1e1030"/>
    <text x="226" y="24" font-family="monospace" font-size="10" fill="#a78bfa">Gemini 2.5 Flash</text>
    <text x="226" y="37" font-family="monospace" font-size="9" fill="#6b7280">Native Audio · Live API</text>
    <rect x="216" y="52" width="160" height="40" rx="6" fill="#1a0e28"/>
    <text x="226" y="68" font-family="monospace" font-size="10" fill="#c4b5fd">I can see a circuit board.</text>
    <text x="226" y="82" font-family="monospace" font-size="10" fill="#c4b5fd">The IC chip looks like...</text>
    <rect x="216" y="100" width="160" height="26" rx="6" fill="#0f0a1e"/>
    <text x="226" y="118" font-family="monospace" font-size="11" fill="#7c3aed">What do you see?</text>
    <rect x="216" y="134" width="160" height="40" rx="6" fill="#1a0e28"/>
    <text x="226" y="150" font-family="monospace" font-size="10" fill="#c4b5fd">A development board,</text>
    <text x="226" y="164" font-family="monospace" font-size="10" fill="#c4b5fd">likely Raspberry Pi 4.</text>
    <!-- input bar -->
    <rect x="216" y="182" width="160" height="34" rx="8" fill="#1e1030" stroke="#f97316" stroke-width="1"/>
    <text x="226" y="203" font-family="monospace" font-size="10" fill="#6b7280">Type a message...</text>
    <!-- WS indicator -->
    <circle cx="220" cy="220" r="4" fill="#22c55e"/>
    <text x="230" y="224" font-family="monospace" font-size="9" fill="#22c55e">WS connected</text>
  </g>
  <!-- logo: hammer + eye (hephaestus AI smith) -->
  <g transform="translate(80,84)" filter="url(#glow)">
    <rect x="0" y="0" width="116" height="116" rx="18" fill="#060408" stroke="url(#acc)" stroke-width="3"/>
    <!-- hammer -->
    <rect x="28" y="54" width="52" height="14" rx="4" fill="none" stroke="url(#acc)" stroke-width="3"/>
    <line x1="54" y1="68" x2="54" y2="96" stroke="url(#acc)" stroke-width="3" stroke-linecap="round"/>
    <!-- eye / camera lens -->
    <ellipse cx="58" cy="38" rx="22" ry="14" fill="none" stroke="url(#acc2)" stroke-width="2.5"/>
    <circle cx="58" cy="38" r="7" fill="none" stroke="url(#acc2)" stroke-width="2"/>
    <circle cx="58" cy="38" r="3" fill="#f97316"/>
  </g>
  <!-- wordmark -->
  <text x="222" y="95" font-family="'SF Mono',Consolas,monospace" font-size="13" fill="#f97316" opacity="0.6" letter-spacing="4">LIVE AI VISUAL ASSISTANT</text>
  <text x="218" y="168" font-family="Arial Black,'Arial Bold',sans-serif" font-size="72" font-weight="900" letter-spacing="-2" fill="#fff8f0">Hephaestus</text>
  <text x="218" y="210" font-family="Arial Black,'Arial Bold',sans-serif" font-size="50" font-weight="900" letter-spacing="-1" fill="url(#acc)">Live Agent</text>
  <rect x="220" y="226" width="500" height="2" fill="url(#acc)" opacity="0.45"/>
  <!-- feature pills -->
  <rect x="222" y="242" width="140" height="26" rx="13" fill="#f97316" opacity="0.15"/>
  <text x="292" y="260" font-family="monospace" font-size="12" fill="#fdba74" text-anchor="middle">Camera Vision</text>
  <rect x="374" y="242" width="130" height="26" rx="13" fill="#7c3aed" opacity="0.15"/>
  <text x="439" y="260" font-family="monospace" font-size="12" fill="#c4b5fd" text-anchor="middle">Live Audio</text>
  <rect x="516" y="242" width="160" height="26" rx="13" fill="#f97316" opacity="0.15"/>
  <text x="596" y="260" font-family="monospace" font-size="12" fill="#fde68a" text-anchor="middle">WebSocket PCM</text>
  <text x="222" y="296" font-family="monospace" font-size="12" fill="#6b7280">Gemini 2.5 Flash Native Audio · FastAPI · React 18 · Web Audio API</text>
</svg>